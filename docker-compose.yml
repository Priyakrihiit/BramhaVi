version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: brahmavidya_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-brahmavidya}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brahmavidya_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brahmavidya_django
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-brahmavidya}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_here}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-key-use-for-local-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brahmavidya_celery
    restart: always
    command: celery -A django_project worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-brahmavidya}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_here}
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-key-use-for-local-development}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend-node:
    build:
      context: .
      dockerfile: ./deployment/Dockerfile
    container_name: brahmavidya_node_server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APP_URL=${APP_URL:-http://localhost:3000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - django-api

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
